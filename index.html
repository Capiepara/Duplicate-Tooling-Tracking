<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Development Tracking Gantt</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Development Tracking Gantt</h1>
        <p>Import Excel and render Gantt chart</p>
      </div>

      <label class="import-btn">
        Import Excel
        <input type="file" id="excelFile" accept=".xlsx,.xls,.xlsm" hidden />
      </label>
    </header>

    <section class="control-panel">
      <div class="control-item">
        <label>Selected File</label>
        <div id="fileName" class="input-box">No file selected</div>
      </div>

      <div class="control-item">
        <label>Sheet</label>
        <select id="sheetSelect" disabled>
          <option>Please import Excel first</option>
        </select>
      </div>

      <button id="loadSheetBtn" disabled>Load Sheet</button>
    </section>

    <section class="filter-panel">
      <input id="partSearch" placeholder="Search Part No..." />
      <select id="stageFilter">
        <option value="ALL">All Stages</option>
      </select>
      <button id="resetBtn">Reset</button>
    </section>
    <section class="kpi-panel">
  <div class="kpi-card">
    <div class="kpi-title">Selected Part</div>
    <div id="kpiPart" class="kpi-value">All</div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Current Stage</div>
    <div id="kpiStage" class="kpi-value">-</div>
    <div id="kpiStageColor" class="kpi-line"></div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Stage Date</div>
    <div id="kpiDate" class="kpi-value">-</div>
  </div>

  <div class="kpi-card">
    <div class="kpi-title">Delay</div>
    <div id="kpiDelay" class="kpi-value">-</div>
  </div>
</section>

<section class="legend-panel" id="legendPanel"></section>
    <section class="gantt-card">
      <div class="gantt-title">
        <h2>Gantt Chart</h2>
        <span id="summaryText">No data</span>
      </div>

      <div class="gantt-wrapper">
        <div id="ganttGrid" class="gantt-grid"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
